name: Deploy Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
          NEXTAUTH_URL: ${{ secrets.STAGING_NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.STAGING_NEXTAUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.STAGING_S3_BUCKET }}
      - name: Deploy to Railway (staging)
        run: npx @railway/cli deploy --service ${{ secrets.RAILWAY_STAGING_SERVICE }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Run migrations on staging
        run: npx @railway/cli run --service ${{ secrets.RAILWAY_STAGING_SERVICE }} -- npx prisma migrate deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ secrets.STAGING_NEXTAUTH_URL }}
          TEST_CONVEYANCER_EMAIL: ${{ secrets.TEST_CONVEYANCER_EMAIL }}
          TEST_CONVEYANCER_PASSWORD: ${{ secrets.TEST_CONVEYANCER_PASSWORD }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [e2e]
    environment: production  # requires manual approval in GitHub
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway (production)
        run: npx @railway/cli deploy --service ${{ secrets.RAILWAY_PROD_SERVICE }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Run migrations on production
        run: npx @railway/cli run --service ${{ secrets.RAILWAY_PROD_SERVICE }} -- npx prisma migrate deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: [deploy-production]
    steps:
      - name: Check /api/health
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PROD_URL }}/api/health)
            if [ "$STATUS" = "200" ]; then exit 0; fi
            echo "Attempt $i: status $STATUS — retrying in 15s"
            sleep 15
          done
          echo "Health check failed after 5 attempts" && exit 1

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [health-check]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            *FFA Deploy* ${{ needs.health-check.result == 'success' && '✅ succeeded' || '❌ failed' }}
            Commit: `${{ github.sha }}` by `${{ github.actor }}`
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
